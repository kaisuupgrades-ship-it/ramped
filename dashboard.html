<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Activity Dashboard · Ramped AI</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:     #0B1220;
      --paper:   #FAFAF7;
      --line:    #E6E4DC;
      --muted:   #5B6272;
      --accent:  #1F4FFF;
      --good:    #0F7A4B;
      --surface: #F5F5F3;
      --danger:  #c0392b;
      --warn:    #B45309;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    a { color: inherit; text-decoration: none; }

    /* ── Auth screen ──────────────────────────────────────────────────────── */
    #auth-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .auth-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 4px 4px 0 var(--ink);
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .auth-card h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--ink);
      margin-bottom: 4px;
    }

    .auth-card .auth-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .auth-card label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .auth-card input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--line);
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      color: var(--ink);
      background: var(--paper);
      outline: none;
      transition: border-color 0.15s;
    }

    .auth-card input[type="password"]:focus { border-color: var(--accent); }

    .auth-error {
      margin-top: 10px;
      font-size: 13px;
      color: var(--danger);
      min-height: 18px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 20px;
      width: 100%;
      padding: 12px 20px;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── App shell ────────────────────────────────────────────────────────── */
    #app { display: none; }

    .dash-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      border-bottom: 1px solid var(--line);
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .dash-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--ink);
    }

    .dash-nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .dash-nav a {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
      transition: color 0.15s;
    }

    .dash-nav a:hover { color: var(--accent); }

    .btn-outline {
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      color: var(--muted);
      background: none;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-outline:hover { color: var(--ink); border-color: var(--ink); }

    /* ── Stats strip ──────────────────────────────────────────────────────── */
    .stats-bar {
      display: flex;
      gap: 16px;
      padding: 20px 28px;
      border-bottom: 1px solid var(--line);
      background: #fff;
      overflow-x: auto;
    }

    .stat-card {
      flex: 1;
      min-width: 130px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 14px 18px;
    }

    .stat-card.good  { background: #EBF7F2; border-color: #A8DABC; }
    .stat-card.bad   { background: #FDECEA; border-color: #f5b8b8; }
    .stat-card.info  { background: #EEF1FF; border-color: #c5cffe; }

    .stat-card .stat-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat-card.good .stat-label { color: var(--good); }
    .stat-card.bad  .stat-label { color: var(--danger); }
    .stat-card.info .stat-label { color: var(--accent); }

    .stat-card .stat-value {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--ink);
    }

    .stat-card.good .stat-value { color: var(--good); }
    .stat-card.bad  .stat-value { color: var(--danger); }
    .stat-card.info .stat-value { color: var(--accent); }

    /* ── Body ─────────────────────────────────────────────────────────────── */
    .dash-body {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 24px 64px;
    }

    /* ── Filter bar ───────────────────────────────────────────────────────── */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
      align-items: center;
    }

    .filter-bar input[type="text"],
    .filter-bar select {
      padding: 7px 11px;
      border: 1px solid var(--line);
      border-radius: 7px;
      font-size: 13px;
      font-family: inherit;
      color: var(--ink);
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }

    .filter-bar input[type="text"]:focus,
    .filter-bar select:focus { border-color: var(--accent); }

    .filter-bar input[type="text"] { min-width: 200px; }

    .btn-refresh {
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-refresh:hover { opacity: 0.85; }
    .btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Table wrapper ────────────────────────────────────────────────────── */
    .table-wrap {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
    }

    table { width: 100%; border-collapse: collapse; min-width: 700px; }

    thead th {
      background: var(--surface);
      padding: 11px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
    }

    tbody tr { border-bottom: 1px solid var(--line); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:nth-child(even) td { background: var(--paper); }
    tbody tr:nth-child(odd)  td { background: #fff; }

    tbody td {
      padding: 11px 14px;
      font-size: 13px;
      color: var(--ink);
      vertical-align: top;
    }

    /* ── Status badge ─────────────────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .badge-running  { background: #EEF1FF; color: var(--accent); }
    .badge-success  { background: #EBF7F2; color: var(--good); }
    .badge-error    { background: #FDECEA; color: var(--danger); }
    .badge-info     { background: #F5F5F3; color: var(--muted); }
    .badge-warn     { background: #FEF3E2; color: var(--warn); }

    /* ── Log drawer ───────────────────────────────────────────────────────── */
    .log-drawer-row { display: none; }
    .log-drawer-row.open { display: table-row; }

    .log-drawer {
      background: #f8f9ff;
      border-top: 1px solid #d0d7ff;
      padding: 0;
    }

    .log-drawer-inner {
      padding: 12px 16px;
      max-height: 340px;
      overflow-y: auto;
    }

    .log-entry {
      display: flex;
      gap: 10px;
      padding: 6px 0;
      border-bottom: 1px solid #e8eaff;
      font-size: 12px;
      align-items: flex-start;
    }

    .log-entry:last-child { border-bottom: none; }

    .log-ts {
      color: var(--muted);
      white-space: nowrap;
      font-size: 11px;
      flex-shrink: 0;
      padding-top: 1px;
    }

    .log-msg { color: var(--ink); flex: 1; word-break: break-word; }

    .log-meta {
      background: var(--surface);
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      font-family: 'Courier New', monospace;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .drawer-empty {
      padding: 16px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    /* ── Row clickable ────────────────────────────────────────────────────── */
    tbody tr.run-row { cursor: pointer; }
    tbody tr.run-row:hover td { background: #f0f3ff; }
    tbody tr.run-row.expanded td { background: #eef1ff; }

    /* ── Empty / loading state ────────────────────────────────────────────── */
    .empty-state {
      padding: 48px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .logo-svg { flex-shrink: 0; }

    @media (max-width: 640px) {
      .dash-header { padding: 12px 16px; }
      .stats-bar   { padding: 16px; gap: 12px; }
      .stat-card   { min-width: 110px; padding: 12px 14px; }
      .stat-card .stat-value { font-size: 22px; }
      .dash-body   { padding: 16px 12px 48px; }
    }
  </style>
</head>
<body>

<!-- ── Auth Screen ──────────────────────────────────────────────────────────── -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <svg class="logo-svg" width="28" height="22" viewBox="0 0 28 22" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="0"  y="10" width="5" height="12" rx="2" fill="#0B1220"/>
        <rect x="7"  y="5"  width="5" height="17" rx="2" fill="#0B1220"/>
        <rect x="14" y="0"  width="5" height="22" rx="2" fill="#1F4FFF"/>
        <rect x="21" y="4"  width="5" height="18" rx="2" fill="#0B1220"/>
      </svg>
      <span style="font-size:16px;font-weight:800;letter-spacing:-0.03em">Activity · Ramped AI</span>
    </div>
    <p class="auth-sub">Enter your admin password to access the activity dashboard.</p>
    <label for="password-input">Password</label>
    <input type="password" id="password-input" placeholder="••••••••••••" autocomplete="current-password" />
    <div class="auth-error" id="auth-error"></div>
    <button class="btn-primary" id="auth-btn" onclick="doAuth()">Enter</button>
  </div>
</div>

<!-- ── App ──────────────────────────────────────────────────────────────────── -->
<div id="app">
  <header class="dash-header">
    <div class="dash-logo">
      <svg class="logo-svg" width="24" height="19" viewBox="0 0 28 22" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="0"  y="10" width="5" height="12" rx="2" fill="#0B1220"/>
        <rect x="7"  y="5"  width="5" height="17" rx="2" fill="#0B1220"/>
        <rect x="14" y="0"  width="5" height="22" rx="2" fill="#1F4FFF"/>
        <rect x="21" y="4"  width="5" height="18" rx="2" fill="#0B1220"/>
      </svg>
      Activity Dashboard
    </div>
    <div class="dash-nav">
      <a href="/admin">← Admin</a>
      <a href="/">← Site</a>
      <button class="btn-outline" onclick="signOut()">Sign out</button>
    </div>
  </header>

  <!-- Stats strip -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">Runs (24h)</div>
      <div class="stat-value" id="stat-total">—</div>
    </div>
    <div class="stat-card good">
      <div class="stat-label">Success rate</div>
      <div class="stat-value" id="stat-success">—</div>
    </div>
    <div class="stat-card bad">
      <div class="stat-label">Error rate</div>
      <div class="stat-value" id="stat-error">—</div>
    </div>
    <div class="stat-card info">
      <div class="stat-label">Avg duration</div>
      <div class="stat-value" id="stat-avg">—</div>
    </div>
  </div>

  <div class="dash-body">
    <!-- Filter bar -->
    <div class="filter-bar">
      <input type="text" id="filter-client" placeholder="Filter by client ID…" />
      <select id="filter-status">
        <option value="">All statuses</option>
        <option value="running">Running</option>
        <option value="success">Success</option>
        <option value="error">Error</option>
      </select>
      <button class="btn-refresh" id="refresh-btn" onclick="loadData()">↻ Refresh</button>
      <span id="last-updated" style="font-size:12px;color:var(--muted);margin-left:4px;"></span>
    </div>

    <!-- Runs table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Client</th>
            <th>Type</th>
            <th>Status</th>
            <th>Duration</th>
            <th>Error</th>
          </tr>
        </thead>
        <tbody id="runs-body">
          <tr><td colspan="6"><div class="empty-state">Loading…</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  'use strict';

  const SESSION_KEY = 'ramped_dash_token';
  let _token = null;
  let _allRuns = [];

  // ── Init ──────────────────────────────────────────────────────────────────────
  (function init() {
    const saved = sessionStorage.getItem(SESSION_KEY);
    if (saved) { _token = saved; showApp(); loadData(); }
    document.getElementById('password-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') doAuth();
    });
  })();

  // ── Auth ──────────────────────────────────────────────────────────────────────
  async function doAuth() {
    const input = document.getElementById('password-input');
    const btn   = document.getElementById('auth-btn');
    const errEl = document.getElementById('auth-error');
    const token = input.value.trim();
    if (!token) { errEl.textContent = 'Please enter a password.'; return; }
    errEl.textContent = '';
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Checking…';
    const ok = await tryAuth(token);
    if (!ok) {
      btn.disabled = false;
      btn.textContent = 'Enter';
    }
  }

  async function tryAuth(token) {
    try {
      const res = await fetch('/api/agent-logs?limit=1', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (res.status === 401) {
        document.getElementById('auth-error').textContent = 'Incorrect password.';
        return false;
      }
      _token = token;
      sessionStorage.setItem(SESSION_KEY, token);
      showApp();
      await loadData();
      return true;
    } catch {
      document.getElementById('auth-error').textContent = 'Network error — try again.';
      return false;
    }
  }

  function signOut() {
    sessionStorage.removeItem(SESSION_KEY);
    location.reload();
  }

  function showApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  }

  // ── Helpers ───────────────────────────────────────────────────────────────────
  function esc(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function fmtTime(iso) {
    if (!iso) return '—';
    try {
      const d = new Date(iso);
      return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true })
        + ' · ' + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    } catch { return iso; }
  }

  function fmtDuration(ms) {
    if (ms == null) return '—';
    if (ms < 1000) return ms + 'ms';
    return (ms / 1000).toFixed(1) + 's';
  }

  function statusBadge(status) {
    const cls = status === 'success' ? 'badge-success'
              : status === 'error'   ? 'badge-error'
              : status === 'running' ? 'badge-running'
              : 'badge-info';
    return `<span class="badge ${cls}">${esc(status || '—')}</span>`;
  }

  function levelBadge(level) {
    const cls = level === 'error' ? 'badge-error'
              : level === 'warn'  ? 'badge-warn'
              : 'badge-info';
    return `<span class="badge ${cls}" style="font-size:10px;padding:1px 6px;">${esc(level)}</span>`;
  }

  function pct(n, total) {
    if (!total) return '—';
    return Math.round(n / total * 100) + '%';
  }

  // ── Load data ─────────────────────────────────────────────────────────────────
  async function loadData() {
    const btn      = document.getElementById('refresh-btn');
    const clientId = document.getElementById('filter-client').value.trim();
    const status   = document.getElementById('filter-status').value;

    btn.disabled = true;
    btn.textContent = 'Loading…';

    let url = '/api/agent-logs?limit=50';
    if (clientId) url += '&client_id=' + encodeURIComponent(clientId);
    if (status)   url += '&status='    + encodeURIComponent(status);

    try {
      const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + _token } });

      if (res.status === 401) {
        sessionStorage.removeItem(SESSION_KEY);
        location.reload();
        return;
      }

      const data = await res.json();
      _allRuns = data.runs || [];

      renderStats(data.stats || {});
      renderRuns(_allRuns);

      document.getElementById('last-updated').textContent =
        'Updated ' + new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

    } catch (err) {
      document.getElementById('runs-body').innerHTML =
        `<tr><td colspan="6"><div class="empty-state">Error loading data: ${esc(err.message)}</div></td></tr>`;
    } finally {
      btn.disabled = false;
      btn.textContent = '↻ Refresh';
    }
  }

  // ── Render stats ──────────────────────────────────────────────────────────────
  function renderStats(stats) {
    const total = stats.total || 0;
    document.getElementById('stat-total').textContent   = total;
    document.getElementById('stat-success').textContent = pct(stats.success || 0, total);
    document.getElementById('stat-error').textContent   = pct(stats.error   || 0, total);
    document.getElementById('stat-avg').textContent     = fmtDuration(stats.avg_duration_ms);
  }

  // ── Render runs table ─────────────────────────────────────────────────────────
  function renderRuns(runs) {
    const body = document.getElementById('runs-body');

    if (!runs.length) {
      body.innerHTML = '<tr><td colspan="6"><div class="empty-state">No runs found in the last 24 hours.</div></td></tr>';
      return;
    }

    const rows = [];
    for (const run of runs) {
      const rid = esc(run.id);
      const errShort = run.error_message
        ? (run.error_message.length > 60 ? run.error_message.slice(0, 60) + '…' : run.error_message)
        : '';

      rows.push(`
        <tr class="run-row" id="run-${rid}" onclick="toggleDrawer('${rid}')">
          <td style="white-space:nowrap;font-size:12px;color:var(--muted)">${fmtTime(run.started_at)}</td>
          <td style="font-weight:600;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(run.client_id || '—')}</td>
          <td style="color:var(--muted)">${esc(run.agent_type || '—')}</td>
          <td>${statusBadge(run.status)}</td>
          <td style="white-space:nowrap;color:var(--muted)">${fmtDuration(run.duration_ms)}</td>
          <td style="color:var(--danger);font-size:12px;max-width:200px;word-break:break-word">${esc(errShort)}</td>
        </tr>
        <tr class="log-drawer-row" id="drawer-${rid}">
          <td colspan="6" style="padding:0">
            <div class="log-drawer">
              ${renderLogDrawer(run.logs || [], run.id)}
            </div>
          </td>
        </tr>
      `);
    }

    body.innerHTML = rows.join('');
  }

  function renderLogDrawer(logs, runId) {
    if (!logs.length) {
      return `<div class="drawer-empty">No log entries for this run.</div>`;
    }
    const entries = logs.map(l => {
      const hasMeta = l.metadata && Object.keys(l.metadata).length > 0;
      return `
        <div class="log-entry">
          <span class="log-ts">${fmtTime(l.created_at)}</span>
          ${levelBadge(l.level)}
          <div class="log-msg">
            ${esc(l.message)}
            ${hasMeta ? `<div class="log-meta">${esc(JSON.stringify(l.metadata, null, 2))}</div>` : ''}
          </div>
        </div>
      `;
    }).join('');
    return `<div class="log-drawer-inner">${entries}</div>`;
  }

  // ── Toggle log drawer ─────────────────────────────────────────────────────────
  function toggleDrawer(runId) {
    const drawer  = document.getElementById('drawer-' + runId);
    const runRow  = document.getElementById('run-'    + runId);
    if (!drawer) return;
    const isOpen  = drawer.classList.toggle('open');
    if (runRow) runRow.classList.toggle('expanded', isOpen);

    // Lazy-load logs if drawer has no content yet (run was beyond first 10)
    if (isOpen) {
      const inner = drawer.querySelector('.log-drawer');
      if (inner && inner.querySelector('.drawer-empty') &&
          inner.querySelector('.drawer-empty').textContent.includes('No log entries')) {
        // already rendered, nothing to do
      }
    }
  }

  // Wire up filter inputs to reload on Enter
  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('filter-client').addEventListener('keydown', e => {
      if (e.key === 'Enter') loadData();
    });
  });
</script>
</body>
</html>
