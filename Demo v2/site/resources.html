<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Resources — Ramped AI</title>
<meta name="description" content="What we're reading. AI ops news, deployment notes, and field-tested writeups for operators." />
<link rel="canonical" href="https://www.30dayramp.com/resources.html" />
<link rel="icon" href="favicon.ico" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="site.css" />
<style>
.res-hero{padding:64px 0 24px}
.res-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
@media (max-width:980px){.res-grid{grid-template-columns:1fr 1fr}}
@media (max-width:640px){.res-grid{grid-template-columns:1fr}}
.res-card{background:linear-gradient(180deg,rgba(255,255,255,0.03),rgba(255,255,255,0.005));
  border:1px solid var(--line);border-radius:16px;padding:22px;display:flex;flex-direction:column;gap:10px;transition:all .2s;text-align:left}
.res-card:hover{transform:translateY(-2px);border-color:var(--line-2);background:rgba(255,255,255,0.04)}
.res-card .meta{display:flex;justify-content:space-between;align-items:center;font-family:var(--font-mono);font-size:10.5px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.08em}
.res-card .src{padding:2px 8px;border-radius:999px;background:var(--bg-3);color:var(--text-2);border:1px solid var(--line)}
.res-card h3{margin:0;font-size:18px;letter-spacing:-0.015em;line-height:1.3;color:var(--text-0)}
.res-card p{margin:0;color:var(--text-2);font-size:14px;line-height:1.5}
.res-card .read{margin-top:auto;padding-top:10px;font-size:13px;color:var(--blue-2);font-weight:600}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin:24px 0}
.filter{padding:8px 14px;border-radius:999px;background:var(--bg-2);border:1px solid var(--line-2);color:var(--text-1);font-size:13px;font-weight:500;font-family:inherit}
.filter:hover{border-color:var(--blue);color:var(--text-0)}
.filter.on{background:rgba(251,146,60,0.12);border-color:var(--orange);color:var(--orange-2)}
.skel{background:linear-gradient(90deg,var(--bg-2),var(--bg-3),var(--bg-2));background-size:200% 100%;animation:shimmer 1.6s infinite;border-radius:6px}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
.skel.line{height:14px;width:80%}
.skel.title{height:22px;width:90%;margin-top:2px}
.skel.tag{height:18px;width:70px;border-radius:999px}
.empty{text-align:center;color:var(--text-2);padding:60px 20px;font-size:15px}
</style>
</head>
<body>
<a class="skip" href="#main">Skip to main content</a>
<div id="ramped-header"></div>

<main id="main">
<section class="res-hero">
  <div class="container">
    <span class="eyebrow"><span class="pulse"></span>Updated weekly · Curated by the Ramped team</span>
    <h1 class="huge" style="text-align:left;font-size:clamp(36px,5vw,60px)">What we're <span class="accent">reading.</span></h1>
    <p class="lede">AI ops news, deployment notes, and field-tested writeups for operators. Pulled from the same feeds we use internally — no listicles, no hype.</p>
  </div>
</section>

<section class="section" style="padding-top:24px">
  <div class="container">
    <div class="filters" id="filters">
      <button class="filter on" data-cat="all">All</button>
      <button class="filter" data-cat="agents">Agents</button>
      <button class="filter" data-cat="ops">Ops</button>
      <button class="filter" data-cat="finance">Finance</button>
      <button class="filter" data-cat="sales">Sales</button>
      <button class="filter" data-cat="news">Industry news</button>
    </div>

    <div class="res-grid" id="res-grid">
      <!-- skeleton placeholders -->
    </div>
  </div>
</section>

<div id="ramped-final-cta"></div>
</main>

<div id="ramped-footer"></div>
<script src="partials.js"></script>
<script>
const grid=document.getElementById("res-grid");
function skeletonCard(){return `<div class="res-card"><div class="meta"><div class="skel tag"></div><div class="skel" style="width:50px;height:12px"></div></div><div class="skel title"></div><div class="skel line"></div><div class="skel line" style="width:60%"></div></div>`}
grid.innerHTML=Array(6).fill(0).map(skeletonCard).join("");

// Mock data — real implementation fetches /api/resources
const RESOURCES=[
  {cat:"agents",src:"Anthropic",date:"3d ago",t:"Building agents that hand off cleanly",d:"How to design escalation paths so your agents know when to ask a human — without becoming a chat-only system."},
  {cat:"ops",src:"Field notes",date:"5d ago",t:"30 days inside a $40M distributor",d:"What we shipped, what broke, and the three integrations we'd skip next time."},
  {cat:"finance",src:"CFO Brief",date:"1w ago",t:"AI-assisted close: 3 patterns that work",d:"Reconciliation, variance memos, and anomaly detection — what's actually in production at midmarket finance teams."},
  {cat:"sales",src:"Gong Labs",date:"1w ago",t:"Lead routing speed beats lead scoring",d:"Counterintuitive data on response-time vs. fit-score and what it means for inbound playbooks."},
  {cat:"news",src:"The Information",date:"2w ago",t:"Anthropic ships agent SDK updates",date:"2w ago",d:"Claude's tool-use API now supports parallel calls and structured handoffs — what it unlocks for operators."},
  {cat:"agents",src:"Ramped journal",date:"2w ago",t:"Why we ship in 30 days, not 90",d:"The deadline isn't marketing — it's a forcing function for scope. A look at our deployment playbook."},
  {cat:"ops",src:"Operators Weekly",date:"3w ago",t:"The unsexy automation that paid for itself",d:"PO matching at a midwest wholesaler. $11K/mo savings on what looked like the most boring workflow on the audit."},
  {cat:"sales",src:"HubSpot blog",date:"3w ago",t:"What 'AI SDR' actually means in 2026",d:"Beyond the marketing copy — what the agents do, what they don't, and where humans still own the loop."},
  {cat:"finance",src:"a16z",date:"4w ago",t:"AI in the back office: a 2026 map",d:"The category map for AI in finance ops — and why most of it's still services-led, not product-led."},
];
const fmtChip={agents:"AGENTS",ops:"OPS",finance:"FINANCE",sales:"SALES",news:"NEWS"};
function render(filter){
  const list=filter==="all"?RESOURCES:RESOURCES.filter(r=>r.cat===filter);
  if(!list.length){grid.innerHTML=`<div class="empty" style="grid-column:1/-1">No items yet for this category — check back soon.</div>`;return}
  grid.innerHTML=list.map(r=>`
    <a class="res-card" href="#" onclick="event.preventDefault()">
      <div class="meta"><span class="src">${fmtChip[r.cat]||r.cat.toUpperCase()} · ${r.src}</span><span>${r.date}</span></div>
      <h3>${r.t}</h3>
      <p>${r.d}</p>
      <div class="read">Read →</div>
    </a>`).join("");
}
document.querySelectorAll(".filter").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll(".filter").forEach(x=>x.classList.toggle("on",x===b));
  render(b.dataset.cat);
}));
setTimeout(()=>render("all"),700);
</script>
</body>
</html>
