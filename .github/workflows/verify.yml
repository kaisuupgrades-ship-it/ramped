# .github/workflows/verify.yml — runs npm run verify on every PR + push to main.
#
# What this does:
#   1. Runs the lint scripts (check-fonts.sh + check-tokens.sh) — catches font
#      loadout drift and design-token drift before merge.
#   2. Runs the API smoke tests against the live deploy (BASE_URL = production).
#      No browser needed for this project, fast (~30s).
#   3. Runs the public Playwright suite against the live deploy. Catches hero
#      regressions, pricing FOUC, broken canonical URLs.
#
# What this DOESN'T do:
#   - Protected page tests (would need admin token in repo secrets)
#   - Lighthouse (slow + flaky in CI)
#   - Mobile (covered by mobile-iphone project — can be added later)
#
# Time budget: ~3-4 min on a fresh runner. Caches node_modules + Playwright
# browsers between runs to keep it under 90s on warm runs.

name: verify
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:  # allow manual runs from the Actions tab

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (fonts + tokens)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run check-fonts.sh
        run: bash scripts/check-fonts.sh
      - name: Run check-tokens.sh
        run: bash scripts/check-tokens.sh

  api-smoke:
    name: API smoke (vs production)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Run API project
        run: npm run test:api
        env:
          BASE_URL: https://www.30dayramp.com
          # ADMIN_TOKEN intentionally unset — admin-endpoint tests skip when missing.
          # MAP_LINK_SECRET intentionally unset — portal HMAC tests skip when missing.

  public-playwright:
    name: Public Playwright (vs production)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('**/package-lock.json') }}
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run public project
        run: npm run test:public
        env:
          BASE_URL: https://www.30dayramp.com
      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
